<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID Pitch Deck</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #121212;
      overflow: hidden;
    }

    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /*
      Each slide is 85vh — shorter than the viewport.
      When a slide is scroll-snapped to center, it occupies
      rows 7.5vh–92.5vh of the viewport, leaving ~7.5vh at
      the top and bottom where adjacent slides' edges peek in.
    */
    .slide {
      height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide img {
      width: 80vw;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      opacity: 0.1;
      transform: scale(0.94);
      transition: opacity 0.3s ease, transform 0.3s ease;
      image-rendering: high-quality;
      user-select: none;
      -webkit-user-drag: none;
    }

    .slide.active img {
      opacity: 1;
      transform: scale(1);
      will-change: opacity, transform;
    }

    @media (max-width: 768px) {
      .slide img {
        width: calc(100vw - 32px);
      }
    }
  </style>
</head>
<body>

<div class="scroll-container" id="container">
  <div class="slide"><img src="3_bl_id_1_01_2x.webp"  alt="Slide 1"  width="3840" height="2160" loading="eager" decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_02_2x.webp"  alt="Slide 2"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_03_2x.webp"  alt="Slide 3"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_04_2x.webp"  alt="Slide 4"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_05_2x.webp"  alt="Slide 5"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_06_2x.webp"  alt="Slide 6"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_07_2x.webp"  alt="Slide 7"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_08_2x.webp"  alt="Slide 8"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_09.webp"  alt="Slide 9"  width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_10_2x.webp" alt="Slide 10" width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_11_2x.webp" alt="Slide 11" width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_12_2x.webp" alt="Slide 12" width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_13_2x.webp" alt="Slide 13" width="3840" height="2160" loading="lazy"  decoding="async"></div>

  <div class="slide"><img src="3_bl_id_1_19_2x.webp" alt="Slide 19" width="3840" height="2160" loading="lazy"  decoding="async"></div>
  <div class="slide"><img src="3_bl_id_1_20_2x.webp" alt="Slide 20" width="3840" height="2160" loading="lazy"  decoding="async"></div>
</div>

<script>
  const container = document.getElementById('container');
  const slides = Array.from(document.querySelectorAll('.slide'));

  let currentIndex = 0;
  let animGen = 0; // incremented each time we start a new animation

  function easeOutQuart(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function getDestFor(index) {
    const s = slides[index];
    return s.offsetTop + s.offsetHeight / 2 - container.clientHeight / 2;
  }

  function goToSlide(index) {
    index = Math.max(0, Math.min(slides.length - 1, index));
    if (index === currentIndex) return;

    currentIndex = index;
    slides.forEach((s, i) => s.classList.toggle('active', i === index));

    const start = container.scrollTop;
    const dest  = getDestFor(index);
    if (Math.abs(start - dest) < 1) return;

    // Cancel any in-flight animation by bumping the generation
    const myGen = ++animGen;
    const duration  = 520;
    const startTime = performance.now();

    function step(now) {
      if (myGen !== animGen) return; // superseded by a newer call
      const t = Math.min((now - startTime) / duration, 1);
      container.scrollTop = start + (dest - start) * easeOutQuart(t);
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        container.scrollTop = dest;
      }
    }
    requestAnimationFrame(step);
  }

  // Accumulate wheel delta so rapid gestures each register,
  // reset the accumulator once it crosses the threshold.
  let wheelAccum = 0;
  let wheelResetTimer;
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    wheelAccum += e.deltaY;
    clearTimeout(wheelResetTimer);
    wheelResetTimer = setTimeout(() => { wheelAccum = 0; }, 250);

    if (Math.abs(wheelAccum) >= 40) {
      const dir = wheelAccum > 0 ? 1 : -1;
      wheelAccum = 0;
      goToSlide(currentIndex + dir);
    }
  }, { passive: false });

  // Arrow keys
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  goToSlide(currentIndex - 1);
  });

  // Touch support
  let touchStartY = 0;
  container.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
  container.addEventListener('touchend', (e) => {
    const delta = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(delta) > 30) goToSlide(currentIndex + (delta > 0 ? 1 : -1));
  }, { passive: true });

  // Snap to first slide on load, then fade it in
  container.scrollTop = getDestFor(0);
  slides[0].classList.add('active');

  window.addEventListener('load', () => {
    const firstImg = slides[0].querySelector('img');
    firstImg.style.opacity = '0';
    firstImg.style.transition = 'none';
    firstImg.style.transform = 'scale(1)';
    firstImg.getBoundingClientRect();
    firstImg.style.transition = 'opacity 1.3s ease';
    firstImg.style.opacity = '1';
    setTimeout(() => { firstImg.style.cssText = ''; }, 1400);
  });
</script>

</body>
</html>
